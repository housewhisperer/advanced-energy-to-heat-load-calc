function findNearestCity(lat,lon){
  let best=null,bestDist=Infinity;
  for(const c of CITIES){const d=Math.pow(c.lat-lat,2)+Math.pow((c.lon-lon)*Math.cos(lat*Math.PI/180),2);if(d<bestDist){bestDist=d;best=c;}}
  return best;
}
function findNearestCities(lat,lon,n=5){
  const R=3959;
  return CITIES.map(c=>{
    const dLat=(c.lat-lat)*Math.PI/180;const dLon=(c.lon-lon)*Math.PI/180;
    const a=Math.sin(dLat/2)**2+Math.cos(lat*Math.PI/180)*Math.cos(c.lat*Math.PI/180)*Math.sin(dLon/2)**2;
    return{...c,miles:Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))};
  }).sort((a,b)=>a.miles-b.miles).slice(0,n);
}

// ── SLIDER COMPONENT ─────────────────────────────────────────────────────────
function Slider({label,value,onChange,min,max,step=1,unit="",color="orange",hint,marks}){
  const pct=((value-min)/(max-min))*100;
  const trackColor=color==="blue"?"#1E3A5F":color==="green"?"#16A34A":"#C2410C";
  return(
    <div style={{marginBottom:18}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
        <label style={{fontSize:13,fontWeight:700,color:"#1E3A5F"}}>{label}</label>
        <span style={{fontSize:16,fontWeight:700,color:trackColor,fontFamily:"monospace",minWidth:70,textAlign:"right"}}>{value}{unit}</span>
      </div>
      <div style={{position:"relative",height:24,display:"flex",alignItems:"center"}}>
        <input type="range" min={min} max={max} step={step} value={value}
          onChange={e=>onChange(Number(e.target.value))}
          style={{width:"100%",accentColor:trackColor}}
          className={color==="blue"?"blue-track":color==="green"?"green-track":""}/>
      </div>
      {marks&&<div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#8B7D6B",marginTop:2}}>
        {marks.map((m,i)=><span key={i}>{m}</span>)}
      </div>}
      {hint&&<p style={{fontSize:11,color:"#8B7D6B",margin:"2px 0 0"}}>{hint}</p>}
    </div>
  );
}

  const [hoveredLoad,setHoveredLoad]=useState(null);
  const [hoveredBin,setHoveredBin]=useState(null);
  const [showMethod,setShowMethod]=useState(false);
  const [useCelsius,setUseCelsius]=useState(false);
  const dropRef=useRef(null);
  const zipDropRef=useRef(null);

  useEffect(()=>{setEfficiency(Math.round(FUELS[fuelType].eff*100));},[fuelType]);

  useEffect(()=>{
    if(zip.length>=3){
      // Canadian postal code: starts with a letter (FSA = first 3 chars like "M5V")
      const isCanadian=/^[A-Za-z][0-9][A-Za-z]/i.test(zip);
      if(isCanadian){
        const fsa=zip.substring(0,3).toUpperCase();
        const coords=FSA[fsa];
        if(coords)setZipCities(findNearestCities(coords[0],coords[1],5));else setZipCities([]);
      } else {
        const p3=zip.substring(0,3);const coords=ZIP3[p3];
        if(coords)setZipCities(findNearestCities(coords[0],coords[1],5));else setZipCities([]);
      }
    }else setZipCities([]);
  },[zip]);

  useEffect(()=>{
    const h=(e)=>{

      if(zipDropRef.current&&!zipDropRef.current.contains(e.target))setZipCities([]);
    };
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);

  const filtered=useMemo(()=>{
    if(!search)return CITIES;
    const s=search.toLowerCase();
    return CITIES.filter(c=>c.n.toLowerCase().includes(s));
  },[search]);

  const dhwInfo=(ft)=>{
    const f=FUELS[ft];
    if(ft==="electric")return{lo:200,hi:400,def:200,unit:"kWh"};
    const lo=Math.round(800000/(f.btu*f.eff));const hi=Math.round(1500000/(f.btu*f.eff));
    return{lo,hi,def:ft.startsWith("natural_gas")?10:Math.round((lo+hi)/2),unit:f.unit};
  };

  // ── BACKUP BTU CALCULATION ────────────────────────────────────────────────
  const backupBTU=useMemo(()=>{
    let total=0;
    total+=woodCords*20000000*0.70;      // 1 cord = 20M BTU, ~70% stove efficiency
    total+=spaceHeaterKwh*3412;          // 100% efficient
    total+=pelletBags*40*8600*(pelletEff/100); // 40 lbs/bag * 8600 BTU/lb * eff
    return total;
  },[woodCords,spaceHeaterKwh,pelletBags,pelletEff]);

  const backupLabel=useMemo(()=>{
    const parts=[];
    if(woodCords>0)parts.push(`${woodCords} cord${woodCords>1?"s":""} wood`);
    if(spaceHeaterKwh>0)parts.push(`${spaceHeaterKwh.toLocaleString()} kWh space heater`);
    if(pelletBags>0)parts.push(`${pelletBags} bags pellets`);
    return parts.join(", ");
  },[woodCords,spaceHeaterKwh,pelletBags]);

  // ── CALCULATE ─────────────────────────────────────────────────────────────
  const calculate=useCallback(()=>{
    if(!city||!annualUsage)return;
    const fuel=FUELS[fuelType];

    const bins=city.b;
    const totalHours=bins.reduce((s,[,h])=>s+h,0);

    // Design temp first (needed for auto-efficiency)
    let cumH=0;const target99=totalHours*0.01;
    let designTemp=bins[0][0];
    for(const [t,h] of bins){cumH+=h;if(cumH>=target99){designTemp=t;break;}}
    const designMid=designTemp+2.5;

    // Auto-detect efficiency: CZ5+ (design ≤ 15°F) → 90% AFUE, else 80%; electric always 100%
    // User can override with the slider; this sets the smart default
    const autoEff=fuel.cat==="electric"?100:(designTemp<=15?90:80);
    const effToUse=efficiency===autoEff||true?efficiency:efficiency; // always use slider value
    const eff=effToUse/100;

    let usage=parseFloat(annualUsage);
    if(dhwIncluded&&summerBaseline)usage=Math.max(0,usage-parseFloat(summerBaseline)*12);
    let deliveredBTU=usage*fuel.btu*eff;

    // Subtract backup heat contribution
    deliveredBTU=Math.max(0,deliveredBTU-backupBTU);

    // Setback: weighted effective indoor temp (used for design load)
    const setbackFraction=setbackHours/24;
    const effectiveIndoor=setpoint*(1-setbackFraction)+setbackTemp*setbackFraction;

    // Degree-hours: deltaT from BALANCE POINT (not setpoint).
    // Balance point = outdoor temp where heating starts (accounts for internal gains/solar).
    // Setpoint = actual indoor temp used for design load calculation.
    // These are intentionally different — same approach as ASHRAE standard method.
    let totalDH=0;
    const heatingBins=[];
    for(const [t,h] of bins){
      const mid=t+2.5;
      if(mid<balancePoint&&h>0){
        const dT=balancePoint-mid;  // deltaT from balance point, not setpoint
        if(dT>0){
          const dh=dT*h;
          totalDH+=dh;
          heatingBins.push({t,mid,h,dT,dh});
        }
      }
    }
    if(totalDH===0){setResults({error:"No heating bins found with current balance point setting. Try raising the balance point."});return;}

    const UA=deliveredBTU/totalDH;

    // Design load uses SETPOINT (effectiveIndoor), not balance point
    const designLoad=UA*(effectiveIndoor-designMid);

    // Load at each bin (for chart) — show load from setpoint perspective
    const loadByBin=bins.map(([t,h])=>{
      const mid=t+2.5;
      const load=mid<balancePoint?Math.max(0,UA*(effectiveIndoor-mid)):0;
      return{t,h,mid,load};
    });

    // Capacity coverage: show design ±20% as center zone
    const lo20=designLoad*0.8;const hi20=designLoad*1.2;
    const capLevels=[
      {label:"0.75× Design",cap:designLoad*0.75},
      {label:"Design Load (99%)",cap:designLoad},
      {label:"-20% (Under-sized risk)",cap:lo20},
      {label:"+20% (Over-sized risk)",cap:hi20},
      {label:"1.4× (ASHRAE max)",cap:designLoad*1.4},
    ];
    const capAnalysis=capLevels.map(({label,cap})=>{
      const meetsAt=effectiveIndoor-(cap/UA);
      let covered=0;
      for(const [t,h] of bins){if((t+2.5)>=meetsAt||(t+2.5)>=balancePoint)covered+=h;}
      return{label,cap,meetsAt,covered,pct:(covered/totalHours)*100};
    });

    const rec14=Math.round(designLoad*1.4);
    setResults({
      UA:Math.round(UA),designLoad:Math.round(designLoad),
      lo20:Math.round(lo20),hi20:Math.round(hi20),rec14,
      designTemp,designMid,deliveredBTU,backupBTU,
      totalDH:Math.round(totalDH),loadByBin,heatingBins,capAnalysis,
      effectiveIndoor:Math.round(effectiveIndoor*10)/10,
      setbackFraction,totalHours,bins,indoor:setpoint,
      balancePoint,setpoint,setbackTemp,setbackHours,
    });
  },[city,annualUsage,fuelType,efficiency,dhwIncluded,summerBaseline,balancePoint,setpoint,setbackTemp,setbackHours,backupBTU]);

  // Auto-set efficiency when city or fuel type changes
  useEffect(()=>{
    if(!city)return;
    const fuel=FUELS[fuelType];
    if(fuel.cat==="electric"){setEfficiency(100);return;}
    const bins=city.b;
    const totH=bins.reduce((s,[,h])=>s+h,0);
    let cumH=0,dt=bins[0][0];
    for(const[t,h]of bins){cumH+=h;if(cumH>=totH*0.01){dt=t;break;}}
    setEfficiency(dt<=15?90:80);
  },[city,fuelType]);

  const fmt=v=>v>=1000?`${(v/1000).toFixed(1)}k`:Math.round(v);

  const toC=f=>Math.round((f-32)*5/9*10)/10;
  const dispT=f=>useCelsius?`${toC(f)}°C`:`${f}°F`;
  const dispTval=f=>useCelsius?toC(f):f;

  // ── CHART: Load by Temp ───────────────────────────────────────────────────
  const LoadChart=({r,useCelsius=false})=>{
  const tc=f=>useCelsius?Math.round((f-32)*5/9*10)/10:f;
  const tu=useCelsius?"°C":"°F";
    if(!r||r.error)return null;
    const heating=r.loadByBin.filter(b=>b.load>0);
    if(!heating.length)return null;
    const W=680,H=320,P={t:35,r:30,b:55,l:72};
    const cW=W-P.l-P.r,cH=H-P.t-P.b;
    const maxLoad=Math.max(...heating.map(b=>b.load))*1.18;
    const barW=Math.min(26,(cW/heating.length)*0.78);
    const gap=(cW-barW*heating.length)/(heating.length+1);

    return(
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:720,display:"block",margin:"0 auto",cursor:"crosshair"}}
        onMouseLeave={()=>setHoveredLoad(null)}>
        <rect x={P.l} y={P.t} width={cW} height={cH} fill="#F8F6F1" rx="3"/>
        {[0,.25,.5,.75,1].map((f,i)=>(
          <g key={i}>
            <line x1={P.l} y1={P.t+cH*(1-f)} x2={W-P.r} y2={P.t+cH*(1-f)} stroke="#D4C9B8" strokeWidth=".5" strokeDasharray={f===0?"0":"3,3"}/>
            <text x={P.l-8} y={P.t+cH*(1-f)+4} textAnchor="end" fontSize="10" fill="#8B7D6B">{fmt(maxLoad*f)}</text>
          </g>
        ))}
        {/* ±20% band */}
        {r.lo20<maxLoad&&r.hi20<maxLoad&&(
          <rect x={P.l} y={P.t+cH*(1-r.hi20/maxLoad)} width={cW} height={cH*(r.hi20-r.lo20)/maxLoad}
            fill="rgba(22,163,74,0.08)" stroke="none"/>
        )}
        {r.hi20<maxLoad&&(
          <line x1={P.l} y1={P.t+cH*(1-r.hi20/maxLoad)} x2={W-P.r} y2={P.t+cH*(1-r.hi20/maxLoad)}
            stroke="#16A34A" strokeWidth="1.5" strokeDasharray="6,3"/>
        )}
        {r.lo20<maxLoad&&(
          <line x1={P.l} y1={P.t+cH*(1-r.lo20/maxLoad)} x2={W-P.r} y2={P.t+cH*(1-r.lo20/maxLoad)}
            stroke="#16A34A" strokeWidth="1.5" strokeDasharray="6,3"/>
        )}
        {r.designLoad<maxLoad&&(
          <g>
            <line x1={P.l} y1={P.t+cH*(1-r.designLoad/maxLoad)} x2={W-P.r} y2={P.t+cH*(1-r.designLoad/maxLoad)}
              stroke="#1E3A5F" strokeWidth="2" strokeDasharray="8,4"/>
            <text x={W-P.r-4} y={P.t+cH*(1-r.designLoad/maxLoad)-5} textAnchor="end" fontSize="9" fill="#1E3A5F" fontWeight="600">Design: {fmt(r.designLoad)}</text>
          </g>
        )}
        {heating.map((b,i)=>{
          const x=P.l+gap+i*(barW+gap);
          const bH=(b.load/maxLoad)*cH;
          const y=P.t+cH-bH;
          const isDesign=b.t===r.designTemp;
          const isHov=hoveredLoad===i;
          const ratio=i/(heating.length-1);
          const rv=Math.round(30+ratio*120),gv=Math.round(60+ratio*100),bv=Math.round(120+ratio*80);
          return(
            <g key={i} onMouseEnter={()=>setHoveredLoad(i)} style={{cursor:"pointer"}}>
              <rect x={x} y={y} width={barW} height={bH}
                fill={isHov?"#F59E0B":isDesign?"#C2410C":`rgb(${rv},${gv},${bv})`}
                rx="1.5" stroke={isDesign?"#C2410C":"none"} strokeWidth={isDesign?2:0}/>
              <text x={x+barW/2} y={P.t+cH+14} textAnchor="middle"
                fontSize={heating.length>20?"7":"9"} fill="#8B7D6B"
                transform={heating.length>14?`rotate(-45, ${x+barW/2}, ${P.t+cH+14})`:""}>{b.t}°</text>
            </g>
          );
        })}
        {hoveredLoad!==null&&heating[hoveredLoad]&&(()=>{
          const b=heating[hoveredLoad];const i=hoveredLoad;
          const x=P.l+gap+i*(barW+gap)+barW/2;
          const bH=(b.load/maxLoad)*cH;const y=P.t+cH-bH;
          const tW=170,tH=62;
          let tX=x-tW/2;if(tX<P.l)tX=P.l;if(tX+tW>W-P.r)tX=W-P.r-tW;
          const tY=Math.max(P.t,y-tH-8);
          return(
            <g>
              <rect x={tX} y={tY} width={tW} height={tH} fill="white" stroke="#1E3A5F" strokeWidth="1" rx="4" style={{filter:"drop-shadow(0 2px 4px rgba(0,0,0,.15))"}}/>
              <text x={tX+8} y={tY+16} fontSize="11" fontWeight="700" fill="#1E3A5F">{b.t}°F to {b.t+5}°F</text>
              <text x={tX+8} y={tY+30} fontSize="10" fill="#5C4E3C">Load: <tspan fontWeight="700" fill="#C2410C">{fmtF(Math.round(b.load))} BTU/hr</tspan></text>
              <text x={tX+8} y={tY+44} fontSize="10" fill="#5C4E3C">{Math.round(b.h)} hrs/yr ({(b.h/r.totalHours*100).toFixed(1)}%)</text>
              <line x1={x} y1={tY+tH} x2={x} y2={y} stroke="#1E3A5F" strokeWidth=".5" strokeDasharray="2,2"/>
            </g>
          );
        })()}
        <text x={W/2} y={H-5} textAnchor="middle" fontSize="11" fill="#5C4E3C" fontWeight="500">Outdoor Temperature (°F)</text>
        <text x={14} y={H/2} textAnchor="middle" fontSize="11" fill="#5C4E3C" fontWeight="500" transform={`rotate(-90, 14, ${H/2})`}>Heat Load (BTU/hr)</text>
        {/* Legend */}
        <rect x={P.l+8} y={P.t+8} width={12} height={8} fill="rgba(22,163,74,0.15)" stroke="#16A34A" strokeWidth="1" rx="1"/>
        <text x={P.l+24} y={P.t+15} fontSize="9" fill="#16A34A" fontWeight="600">±20% range</text>
        <line x1={P.l+100} y1={P.t+12} x2={P.l+116} y2={P.t+12} stroke="#1E3A5F" strokeWidth="2" strokeDasharray="4,2"/>
        <text x={P.l+120} y={P.t+15} fontSize="9" fill="#1E3A5F" fontWeight="600">Design load</text>
      </svg>
    );
  };

  // ── COVERAGE TABLE ────────────────────────────────────────────────────────
  const CoverageTable=({r})=>{
    if(!r)return null;
    return(
      <div style={{overflowX:"auto"}}>
        <table style={{fontSize:13}}>
          <thead><tr style={{borderBottom:"2px solid #1E3A5F"}}>
            {["Sizing Option","BTU/hr","Tons","Meets Load Above","Hrs Covered","% Year"].map((h,i)=>(
              <th key={i} style={{textAlign:"left",padding:"8px 10px",color:"#1E3A5F",fontSize:12,fontWeight:600}}>{h}</th>
            ))}
          </tr></thead>
          <tbody>{r.capAnalysis.map((row,i)=>{
            const isDesign=i===1;const isPlus=i===3;const isMinus=i===2;
            return(
              <tr key={i} style={{borderBottom:"1px solid #E8E0D4",
                background:isDesign?"#EDF5FF":isPlus?"#FFF7ED":isMinus?"#F0FDF4":"transparent",
                fontWeight:isDesign?700:400}}>
                <td style={{padding:"7px 10px",color:"#3D3425"}}>{row.label}</td>
                <td style={{padding:"7px 10px"}}>{fmtF(Math.round(row.cap))}</td>
                <td style={{padding:"7px 10px"}}>{(row.cap/12000).toFixed(1)}</td>
                <td style={{padding:"7px 10px"}}>{Math.round(row.meetsAt)}°F</td>
                <td style={{padding:"7px 10px"}}>{Math.round(row.covered).toLocaleString()}</td>
                <td style={{padding:"7px 10px"}}>
                  <span style={{display:"inline-block",minWidth:44,textAlign:"center",
                    background:row.pct>99?"#DCFCE7":row.pct>95?"#FEF9C3":"#FEE2E2",
                    borderRadius:4,padding:"2px 6px",fontSize:12,fontWeight:600}}>{row.pct.toFixed(1)}%</span>
                </td>
              </tr>
            );
          })}</tbody>
        </table>
      </div>
    );
  };

  // ── RENDER ────────────────────────────────────────────────────────────────
  const inp={width:"100%",padding:"8px 12px",border:"1px solid #D4C9B8",borderRadius:4,fontSize:14,background:"white",boxSizing:"border-box",color:"#2C1F0E"};
  const lb={display:"block",fontSize:13,fontWeight:700,color:"#1E3A5F",marginBottom:4};
  const sectionBox={background:"#FEFCF8",border:"1px solid #E8E0D4",borderRadius:6,padding:"16px 18px",marginBottom:12};

  return(
    <div style={{fontFamily:"'Georgia',serif",maxWidth:780,margin:"0 auto",color:"#2C1F0E",lineHeight:1.5}}>

      {/* ── HEADER ── */}
      <div style={{background:"linear-gradient(135deg,#1E3A5F 0%,#2D5282 100%)",color:"white",padding:"22px 26px",borderRadius:"10px 10px 0 0",borderBottom:"3px solid #C2410C"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
          <span style={{fontSize:28}}>🏠</span>
          <h1 style={{margin:0,fontSize:22,fontWeight:700,letterSpacing:"-0.02em"}}>Advanced Energy Use → Load Calculator</h1>
        </div>
        <p style={{margin:"4px 0 0",fontSize:13,opacity:.85}}>
          Balance point · Setback · Backup heat · 185 US &amp; Canadian cities · ERA5 1991–2020
        </p>
        <p style={{margin:"6px 0 0",fontSize:11,opacity:.65}}>By Nate the House Whisperer · natethehousewhisperer.com</p>
      </div>

      {/* ── INPUTS ── */}
      <div style={{background:"#FEFCF8",border:"1px solid #E8E0D4",borderTop:"none",padding:"20px 24px"}}>

        {/* City + ZIP */}
        <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
          <div style={{flex:2,minWidth:230,position:"relative"}} ref={dropRef}>
            <label style={lb}>City</label>
            <input value={search} placeholder="Type city name…" onChange={e=>{setSearch(e.target.value);setShowDrop(true);setZip("");}}
              onFocus={()=>setShowDrop(true)} style={inp}/>
            {city&&search===city.n&&<span style={{position:"absolute",right:10,top:34,color:"#16A34A",fontSize:16}}>✓</span>}
            {showDrop&&filtered.length>0&&(
              <div style={{position:"absolute",top:"100%",left:0,right:0,maxHeight:220,overflow:"auto",background:"white",border:"1px solid #D4C9B8",borderTop:"none",borderRadius:"0 0 4px 4px",zIndex:20,boxShadow:"0 4px 12px rgba(0,0,0,.12)"}}>
                {filtered.slice(0,30).map((c,i)=>(
                  <div key={i} onClick={()=>{setCity(c);setSearch(c.n);setShowDrop(false);}}
                    style={{padding:"8px 12px",cursor:"pointer",fontSize:13,borderBottom:"1px solid #F0EAE0",background:city&&city.n===c.n?"#EDF5FF":"white"}}
                    onMouseEnter={e=>e.currentTarget.style.background="#F5F0E8"}
                    onMouseLeave={e=>e.currentTarget.style.background=city&&city.n===c.n?"#EDF5FF":"white"}>
                    <strong>{c.n}</strong><span style={{float:"right",fontSize:11,color:"#8B7D6B"}}>{c.lat.toFixed(1)}°N</span>
                  </div>
                ))}
                {filtered.length>30&&<div style={{padding:"6px 12px",fontSize:11,color:"#8B7D6B",textAlign:"center"}}>+{filtered.length-30} more…</div>}
              </div>

          </div>
          <div style={{flex:1,minWidth:110,position:"relative"}} ref={zipDropRef}>
            <label style={lb}>or ZIP / Postal Code</label>
            <input value={zip} placeholder="e.g. 44102 or M5V" maxLength={7} onChange={e=>{setZip(e.target.value.replace(/[^A-Za-z0-9]/g,"").slice(0,7).toUpperCase());setShowDrop(false);}} style={inp}/>
            {zipCities.length>0&&(
              <div style={{position:"absolute",top:"100%",left:0,right:0,background:"white",border:"1px solid #D4C9B8",borderRadius:"0 0 4px 4px",zIndex:20,boxShadow:"0 4px 12px rgba(0,0,0,.12)"}}>
                <div style={{padding:"5px 10px",fontSize:10,color:"#8B7D6B",background:"#F5F0E8",fontWeight:600}}>Nearest cities:</div>
                {zipCities.map((c,i)=>(
                  <div key={i} onClick={()=>{setCity(c);setSearch(c.n);setZipCities([]);}}

            <strong>{city.n}</strong> — {city.lat.toFixed(2)}°N, {Math.abs(city.lon).toFixed(2)}°W — {city.b.length} temp bins — {city.b.reduce((s,[,h])=>s+h,0).toLocaleString()} hrs of data

              {Object.entries(FUELS).map(([k,f])=><option key={k} value={k}>{f.name} ({f.unit})</option>)}
            </select>

          <div>
            <label style={lb}>Annual Heating Fuel Use ({FUELS[fuelType].unit})</label>

            marks={["50% old","80% std gas","95% modcon","100% elec"]}/>

          <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,color:"#5C4E3C"}}>

          </label>
          {dhwIncluded&&(()=>{
            const di=dhwInfo(fuelType);
            return(
              <div style={{marginTop:8,paddingLeft:22}}>
                <label style={{...lb,fontSize:12}}>Avg summer monthly usage ({FUELS[fuelType].unit})</label>
                <input type="number" value={summerBaseline} onChange={e=>setSummerBaseline(e.target.value)}
                  placeholder={`e.g. ${di.def}`} style={{...inp,width:200}}/>
                <p style={{fontSize:11,color:"#8B7D6B",margin:"3px 0 0"}}>Typical DHW: <strong>{di.lo}–{di.hi} {di.unit}/month</strong>. Summer baseline ≈ DHW only. Subtracted ×12 from annual total.</p>
              </div>
            );
          })()}
        </div>

        {/* ── BUILDING BEHAVIOR SLIDERS ── */}
        <div style={{background:"#F0F4FF",border:"1px solid #C7D4F0",borderRadius:8,padding:"18px 20px",marginBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
            <span style={{fontSize:18}}>🌡️</span>
            <h3 style={{margin:0,fontSize:15,fontWeight:700,color:"#1E3A5F"}}>Building Behavior</h3>
            <span style={{fontSize:11,color:"#5C7ABF",background:"#DBEAFE",padding:"2px 8px",borderRadius:10,fontWeight:600}}>NEW</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 32px"}} className="grid2">
            <Slider label="Building Balance Point" value={balancePoint} onChange={setBalancePoint} min={40} max={70} unit="°F" color="blue"
              hint="Outdoor temp where heating kicks on. Tight/solar homes: 45–55°F. Standard assumption: 65°F. Older leaky homes: up to 68°F."
              marks={["40° (super tight)","55° (modern)","65° (standard)","70°"]}/>
            <Slider label="Heating Setpoint" value={setpoint} onChange={setSetpoint} min={60} max={80} unit="°F" color="orange"
              hint="What your thermostat is set to when you're actively heating."
              marks={["60°","68° (typical)","80°"]}/>
            <Slider label="Setback Temperature" value={setbackTemp} onChange={setSetbackTemp}
              min={Math.min(55,setpoint-1)} max={setpoint-1} unit="°F" color="blue"
              hint="Night/away temperature. Lower setback = bigger difference from setpoint."
              marks={["55°","62° (typical)","67°"]}/>
            <Slider label="Setback Duration" value={setbackHours} onChange={setSetbackHours} min={0} max={16} unit=" hrs/day" color="green"
              hint="Hours per day at setback temp. 0 = no setback. 8 hrs typical (nights + away)."
              marks={["0 (none)","8 hrs (typical)","16 hrs"]}/>
          </div>
          {setbackHours>0&&(
            <div style={{marginTop:4,padding:"8px 12px",background:"rgba(30,58,95,.07)",borderRadius:5,fontSize:12,color:"#1E3A5F"}}>
              <strong>Weighted effective indoor temp:</strong> {setpoint}°×{((24-setbackHours)/24*100).toFixed(0)}% + {setbackTemp}°×{(setbackHours/24*100).toFixed(0)}% = <strong>{(setpoint*((24-setbackHours)/24)+setbackTemp*(setbackHours/24)).toFixed(1)}°F average</strong>
            </div>
          )}
        </div>

        {/* ── BACKUP FUELS ── */}
        <div style={{background:"#FFF7ED",border:"1px solid #FED7AA",borderRadius:8,padding:"14px 18px",marginBottom:16}}>
          <button onClick={()=>setShowBackup(!showBackup)}
            style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#C2410C",fontWeight:700,padding:0,display:"flex",alignItems:"center",gap:8,width:"100%",textAlign:"left"}}>
            <span>{showBackup?"▼":"▶"}</span>
            <span>🪵 Supplemental / Backup Heat</span>
            <span style={{fontSize:11,color:"#D97706",background:"#FEF3C7",padding:"2px 8px",borderRadius:10,marginLeft:4}}>subtract from primary fuel</span>
            {backupBTU>0&&<span style={{marginLeft:"auto",fontSize:12,color:"#92400E",fontWeight:700}}>{(backupBTU/1e6).toFixed(1)}M BTU subtracted</span>}
          </button>
          {showBackup&&(
            <div style={{marginTop:14}}>
              <p style={{fontSize:12,color:"#92400E",marginBottom:12}}>
                If your primary fuel meter includes energy you're <em>not</em> counting (wood stove, plug-in space heaters, etc.), subtract those contributions here so your primary system load is calculated correctly.
              </p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}} className="grid2" style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12}}>
                <div>
                  <label style={{...lb,fontSize:12,color:"#92400E"}}>🪵 Wood Stove (cords/yr)</label>
                  <input type="number" min="0" step="0.5" value={woodCords||""} onChange={e=>setWoodCords(Number(e.target.value)||0)} placeholder="0" style={{...inp,fontSize:13}}/>
                  <p style={{fontSize:10,color:"#A16207",margin:"3px 0 0"}}>≈ {(woodCords*20*0.7).toFixed(0)}M BTU delivered<br/>(1 cord = 20M BTU × 70% eff)</p>
                </div>
                <div>
                  <label style={{...lb,fontSize:12,color:"#92400E"}}>🔌 Space Heater (kWh/yr)</label>
                  <input type="number" min="0" step="100" value={spaceHeaterKwh||""} onChange={e=>setSpaceHeaterKwh(Number(e.target.value)||0)} placeholder="0" style={{...inp,fontSize:13}}/>
                  <p style={{fontSize:10,color:"#A16207",margin:"3px 0 0"}}>≈ {(spaceHeaterKwh*3412/1e6).toFixed(2)}M BTU<br/>(100% efficient)</p>
                </div>
                <div>
                  <label style={{...lb,fontSize:12,color:"#92400E"}}>🌾 Pellet Stove (bags/yr)</label>
                  <input type="number" min="0" value={pelletBags||""} onChange={e=>setPelletBags(Number(e.target.value)||0)} placeholder="0" style={{...inp,fontSize:13}}/>
                  <p style={{fontSize:10,color:"#A16207",margin:"3px 0 0"}}>≈ {(pelletBags*40*8600*(pelletEff/100)/1e6).toFixed(2)}M BTU<br/>(40 lbs/bag @ {pelletEff}% eff)</p>
                  <select value={pelletEff} onChange={e=>setPelletEff(Number(e.target.value))} style={{...inp,fontSize:11,padding:"3px 6px",marginTop:4,width:"auto"}}>
                    <option value={70}>70% (insert)</option>
                    <option value={80}>80% (freestanding)</option>
                    <option value={85}>85% (high eff)</option>
                  </select>
                </div>
              </div>
              {backupBTU>0&&(
                <div style={{marginTop:10,padding:"8px 12px",background:"rgba(194,65,12,.08)",borderRadius:5,fontSize:12,color:"#92400E",fontWeight:600}}>
                  Total backup heat: {(backupBTU/1e6).toFixed(2)}M BTU/yr subtracted from primary fuel analysis
                </div>
              )}
            </div>
          )}
        </div>

        {/* Calculate button */}
        <button onClick={calculate} disabled={!city||!annualUsage}
          style={{width:"100%",padding:"13px 24px",
            background:(!city||!annualUsage)?"#C4B8A6":"linear-gradient(135deg,#C2410C,#DC2626)",
            color:"white",border:"none",borderRadius:7,fontSize:15,fontWeight:700,
            cursor:(!city||!annualUsage)?"default":"pointer",
            boxShadow:(!city||!annualUsage)?"none":"0 3px 12px rgba(194,65,12,.35)",
            letterSpacing:"0.02em"}}>
          🔍 Calculate Design Heating Load
        </button>
      </div>

      {/* ── RESULTS ── */}
      {results&&!results.error&&(
        <div style={{border:"1px solid #E8E0D4",borderTop:"none",background:"white"}}>
          <div style={{display:"flex",justifyContent:"flex-end",padding:"8px 16px 0",borderBottom:"1px solid #F0EAE0"}}>
            <div onClick={()=>setUseCelsius(!useCelsius)} style={{display:"flex",background:"#E8E0D4",borderRadius:20,padding:2,cursor:"pointer",userSelect:"none"}}>
              {["°F","°C"].map((u,i)=>{
                const active=(i===0&&!useCelsius)||(i===1&&useCelsius);
                return <div key={u} style={{padding:"4px 14px",borderRadius:18,fontSize:12,fontWeight:700,background:active?"#1E3A5F":"transparent",color:active?"white":"#8B7D6B",transition:"all 0.15s"}}>{u}</div>;
              })}
            </div>
          </div>

          {/* Summary cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",borderBottom:"1px solid #E8E0D4"}}>
            {[
              {label:"Building UA Value",value:results.UA.toLocaleString(),unit:"BTU/hr·°F"},
              {label:"Design Load (99%)",value:fmtF(results.designLoad),unit:`BTU/hr @ ${dispT(results.designTemp)}`,accent:true},
              {label:"±20% Sweet Spot",value:`${fmtF(results.lo20)}–${fmtF(results.hi20)}`,unit:"BTU/hr range",blue:true},
              {label:"Max Recommended 1.4×",value:fmtF(results.rec14),unit:`${(results.rec14/12000).toFixed(1)} tons`,green:true},
            ].map((c,i)=>(
              <div key={i} style={{padding:"14px 12px",textAlign:"center",borderLeft:i>0?"1px solid #E8E0D4":"none"}}>
                <div style={{fontSize:11,fontWeight:600,color:"#8B7D6B",textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>{c.label}</div>
                <div style={{fontSize:c.value.length>10?15:20,fontWeight:700,color:c.accent?"#C2410C":c.green?"#16A34A":c.blue?"#1E3A5F":"#1E3A5F",lineHeight:1.1}}>{c.value}</div>
                <div style={{fontSize:11,color:"#8B7D6B",marginTop:2}}>{c.unit}</div>
              </div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",borderBottom:"1px solid #E8E0D4"}}>
            {[
              {label:"Tons @ Design",value:(results.designLoad/12000).toFixed(1)},
              {label:"Eff. Indoor Avg",value:dispT(results.effectiveIndoor)},
              {label:"Delivered Heat/yr",value:`${(results.deliveredBTU/1e6).toFixed(1)}M BTU`},
              {label:"Backup Subtracted",value:results.backupBTU>0?`${(results.backupBTU/1e6).toFixed(1)}M BTU`:"None"},
            ].map((c,i)=>(
              <div key={i} style={{padding:"10px 12px",textAlign:"center",borderLeft:i>0?"1px solid #E8E0D4":"none"}}>
                <div style={{fontSize:11,fontWeight:600,color:"#8B7D6B",textTransform:"uppercase",letterSpacing:".05em",marginBottom:2}}>{c.label}</div>
                <div style={{fontSize:17,fontWeight:700,color:"#1E3A5F"}}>{c.value}</div>
              </div>
            ))}
          </div>

          {/* Settings used */}
          <div style={{padding:"10px 20px",borderBottom:"1px solid #E8E0D4",background:"#F9F6F0",fontSize:12,color:"#5C4E3C",display:"flex",gap:16,flexWrap:"wrap"}}>
            <span>⚙️ <strong>Settings used:</strong></span>
            <span>Balance pt: <strong>{dispT(results.balancePoint)}</strong></span>
            <span>Setpoint: <strong>{dispT(results.setpoint)}</strong></span>
            <span>Setback: <strong>{dispT(results.setbackTemp)} × {results.setbackHours} hrs/day</strong></span>
            {results.backupBTU>0&&<span>Backup: <strong>{(results.backupBTU/1e6).toFixed(1)}M BTU subtracted</strong></span>}
          </div>

          {/* Load chart */}
          <div style={{padding:"16px 22px",borderBottom:"1px solid #E8E0D4"}}>
            <h3 style={{margin:"0 0 4px",fontSize:15,fontWeight:700,color:"#1E3A5F"}}>Heat Load by Temperature</h3>
            <p style={{fontSize:12,color:"#8B7D6B",margin:"0 0 10px"}}>
              Hover bars to see load &amp; hours. Blue line = design load. Green band = ±20% sizing range. Orange bar = your specific hover bin.
            </p>
            <LoadChart r={results} useCelsius={useCelsius}/>
          </div>

          {/* Capacity table */}
          <div style={{padding:"16px 22px",borderBottom:"1px solid #E8E0D4"}}>
            <h3 style={{margin:"0 0 8px",fontSize:15,fontWeight:700,color:"#1E3A5F"}}>Equipment Sizing Analysis</h3>
            <CoverageTable r={results}/>
          </div>

          {/* Insight box */}
          <div style={{padding:"16px 22px"}}>
            <div style={{background:"#FFF7ED",border:"1px solid #FDBA74",borderRadius:7,padding:"14px 16px"}}>
              <div style={{fontWeight:700,color:"#C2410C",fontSize:13,marginBottom:6}}>🔍 What This Means</div>
              <p style={{margin:0,fontSize:13,color:"#5C4E3C",lineHeight:1.6}}>
                For <strong>{city.n}</strong> with a <strong>{results.balancePoint}°F balance point</strong> and
                {results.setbackHours>0?` ${results.setbackHours} hrs/day setback to ${results.setbackTemp}°F, `:` no setback, `}
                your building's heat loss rate is <strong>{results.UA.toLocaleString()} BTU/hr·°F</strong>.
                At the 99% design temperature of <strong>{results.designTemp}°F</strong>, the heating load is <strong>{fmtF(results.designLoad)} BTU/hr</strong>.
                The ±20% sizing sweet spot is <strong>{fmtF(results.lo20)} – {fmtF(results.hi20)} BTU/hr</strong>{" "}
                ({(results.lo20/12000).toFixed(1)}–{(results.hi20/12000).toFixed(1)} tons).
                {results.backupBTU>0&&` Note: ${(results.backupBTU/1e6).toFixed(1)}M BTU of supplemental heat was subtracted before calculating the primary system load.`}
              </p>
            </div>
          </div>
        </div>
      )}

      {results&&results.error&&(
        <div style={{border:"1px solid #FCA5A5",background:"#FEF2F2",padding:"16px 24px",color:"#991B1B",borderRadius:"0 0 8px 8px"}}>
          ⚠️ {results.error}
        </div>
      )}

      {/* ── METHODOLOGY ── */}
      <div style={{marginTop:2}}>
        <button onClick={()=>setShowMethod(!showMethod)}
          style={{width:"100%",background:"#F5F0E8",border:"1px solid #E8E0D4",borderTop:"none",padding:"10px 24px",cursor:"pointer",fontSize:13,color:"#5C4E3C",fontWeight:500,textAlign:"left",borderRadius:"0 0 8px 8px"}}>
          {showMethod?"▼ Hide":"▶ Show"} Methodology &amp; Data Sources
        </button>
        {showMethod&&(
          <div style={{padding:"18px 24px",background:"#FEFCF8",border:"1px solid #E8E0D4",borderTop:"none",borderRadius:"0 0 8px 8px",fontSize:13,color:"#5C4E3C"}}>
            <p style={{fontWeight:700,marginBottom:8}}>Advanced Energy Use → Load Method</p>
            <p style={{marginBottom:8}}>Uses real hourly temperature bin data (ERA5 1991–2020) for 185 cities. Each 5°F bin shows annual hours at that temperature range.</p>
            <p style={{fontWeight:600,marginBottom:4}}>Key advances over basic version:</p>
            <p style={{marginBottom:6}}><strong>Balance Point Slider:</strong> Only bins below your balance point count as "heating hours." Tight, solar-heated homes may not need heating until outdoors drops to 45–55°F, not the assumed 65°F.</p>
            <p style={{marginBottom:6}}><strong>Setback Modeling:</strong> Calculates a weighted effective indoor temperature: (setpoint × occupied fraction) + (setback temp × setback fraction). This corrects for the fact that energy bills reflect real behavior, not 24/7 at setpoint.</p>
            <p style={{marginBottom:6}}><strong>Backup Heat Subtraction:</strong> Wood stoves, pellet stoves, and plug-in space heaters contribute BTU that doesn't show up in your primary fuel bill. Subtracting them isolates how much your primary system is actually doing.</p>
            <p style={{marginBottom:6}}><strong>±20% Range:</strong> Replaces the legacy 1.4× multiplier with a ±20% band around design load, consistent with modern modulating equipment sizing philosophy.</p>
            <p style={{marginBottom:8}}><strong>Calculation:</strong> Degree-hours = Σ(balance_point – outdoor_mid) × hours, for all bins below balance point. UA = Delivered BTU ÷ degree-hours. Design load = UA × (indoor_setpoint – design_temp). <em>Balance point and setpoint are intentionally different</em> — the standard ASHRAE method uses 65°F balance point for degree-hours but 72°F indoor setpoint for design load, since internal gains offset heating at milder temperatures but become negligible at design conditions.</p>
            <p style={{marginBottom:6}}><strong>Auto-Efficiency:</strong> CZ5+ climates (99% design temp ≤15°F) default to 90% AFUE; warmer climates default to 80%. You can override this with the slider.</p>
            <p style={{fontSize:11,color:"#8B7D6B"}}>Based on methodology by Ryan Lewis (NOAA bin method) and Dana Dorsett (fuel-use method). ERA5 Reanalysis via Open-Meteo. Calculator by Nate the House Whisperer · natethehousewhisperer.com</p>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AdvancedEnergyCalc/>);
</script>
</body>
</html>
